  <text x="27" y="342" font-family="system-ui,sans-serif" font-size="7"
        fill="#5B9A3A" opacity="0.7" text-anchor="middle" letter-spacing="1.5">PALETTE</text>

  <!-- ── Right: geometric logo mark ── -->
  <circle cx="336" cy="108" r="44" fill="none" stroke="#1C1C1C" stroke-width="1.5" opacity="0.65"/>
  <circle cx="336" cy="108" r="30" fill="none" stroke="#5B9A3A" stroke-width="1.2" opacity="0.65"/>
  <polygon points="336,74 364,132 308,132"
           fill="none" stroke="#1C1C1C" stroke-width="1.2" opacity="0.55"/>
  <circle cx="336" cy="108" r="4" fill="#5B9A3A" opacity="0.8"/>
  <line x1="336" y1="64"  x2="336" y2="152"
        stroke="#5B9A3A" stroke-width="0.6" opacity="0.22" stroke-dasharray="4 4"/>
  <line x1="292" y1="108" x2="380" y2="108"
        stroke="#5B9A3A" stroke-width="0.6" opacity="0.22" stroke-dasharray="4 4"/>
  <text x="336" y="162" font-family="system-ui,sans-serif" font-size="7.5"
        fill="#1C1C1C" opacity="0.4" text-anchor="middle" letter-spacing="3">LOGO MARK</text>

  <!-- ── Camera dock ── -->
  <rect x="132" y="174" width="136" height="92" rx="4" fill="#EDE8E0" opacity="0.55"/>
  <rect x="135" y="178" width="130" height="85" rx="3"
        stroke="#5B9A3A" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  <!-- corner L-brackets -->
  <path d="M135 191 L135 178 L148 178" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <path d="M252 178 L265 178 L265 191" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <path d="M135 250 L135 263 L148 263" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <path d="M252 263 L265 263 L265 250" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <!-- crosshair -->
  <line x1="196" y1="220.5" x2="204" y2="220.5" stroke="#5B9A3A" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="216.5" x2="200" y2="224.5" stroke="#5B9A3A" stroke-width="1" opacity="0.5"/>
  <text x="200" y="274" font-family="monospace,system-ui" font-size="8.5" fill="#5B9A3A"
        text-anchor="middle" letter-spacing="4" opacity="0.7">CAM A</text>

  <!-- guidelines panel right of dock -->
  <rect x="278" y="178" width="98" height="10" rx="2" fill="#5B9A3A" opacity="0.18"/>
  <rect x="278" y="193" width="98" height="7"  rx="2" fill="#1C1C1C" opacity="0.10"/>
  <rect x="278" y="205" width="98" height="7"  rx="2" fill="#8DC468" opacity="0.22"/>
  <rect x="278" y="217" width="62" height="7"  rx="2" fill="#1C1C1C" opacity="0.08"/>
  <rect x="278" y="229" width="80" height="7"  rx="2" fill="#5B9A3A" opacity="0.14"/>
  <rect x="278" y="241" width="50" height="7"  rx="2" fill="#1C1C1C" opacity="0.07"/>
  <text x="278" y="260" font-family="system-ui,sans-serif" font-size="7"
        fill="#5B9A3A" opacity="0.5" letter-spacing="2">GUIDELINES</text>

  <!-- ── Bottom: colour swatch bar ── -->
  <rect x="16"  y="358" width="56" height="36" rx="3" fill="#1C1C1C"/>
  <rect x="78"  y="358" width="56" height="36" rx="3" fill="#3A6B1F"/>
  <rect x="140" y="358" width="56" height="36" rx="3" fill="#5B9A3A"/>
  <rect x="202" y="358" width="56" height="36" rx="3" fill="#8DC468"/>
  <rect x="264" y="358" width="56" height="36" rx="3" fill="#CDE8B4"/>
  <rect x="326" y="358" width="58" height="36" rx="3" fill="#F0EDE5"
        stroke="#D4D0C6" stroke-width="1"/>
  <text x="44"  y="404" font-family="monospace,system-ui" font-size="6.5" fill="#5B9A3A" opacity="0.55" text-anchor="middle">#1C1C1C</text>
  <text x="106" y="404" font-family="monospace,system-ui" font-size="6.5" fill="#5B9A3A" opacity="0.55" text-anchor="middle">#3A6B1F</text>
  <text x="168" y="404" font-family="monospace,system-ui" font-size="6.5" fill="#5B9A3A" opacity="0.55" text-anchor="middle">#5B9A3A</text>
  <text x="230" y="404" font-family="monospace,system-ui" font-size="6.5" fill="#5B9A3A" opacity="0.55" text-anchor="middle">#8DC468</text>

  <!-- brand book stack bottom-right -->
  <rect x="286" y="418" width="90" height="58" rx="3" fill="#3A6B1F" transform="rotate(-4 286 418)"/>
  <rect x="289" y="422" width="90" height="58" rx="3" fill="#5B9A3A" transform="rotate(-1 289 422)"/>
  <rect x="292" y="426" width="90" height="58" rx="3" fill="#F7F5F0" stroke="#D4D0C6" stroke-width="1"/>
  <rect x="298" y="434" width="52" height="3" rx="1" fill="#1C1C1C" opacity="0.28"/>
  <rect x="298" y="441" width="38" height="3" rx="1" fill="#5B9A3A" opacity="0.5"/>
  <rect x="298" y="448" width="46" height="2" rx="1" fill="#1C1C1C" opacity="0.16"/>
  <text x="337" y="492" font-family="system-ui,sans-serif" font-size="7"
        fill="#5B9A3A" opacity="0.45" text-anchor="middle" letter-spacing="2">BRAND BOOK</text>
</svg>
