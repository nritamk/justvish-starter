<svg viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="br-dots" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="10" cy="10" r="0.9" fill="#C8C4BA" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#F7F5F0"/>
  <rect width="400" height="500" fill="url(#br-dots)"/>

  <!-- Ghost number -->
  <text x="340" y="490" font-family="system-ui,sans-serif" font-size="160"
        font-weight="800" fill="#1C1C1C" opacity="0.04" text-anchor="middle">01</text>

  <!-- ── Top: typography specimen ── -->
  <!-- large A with construction lines -->
  <text x="62" y="148" font-family="Georgia,serif" font-size="96" font-weight="700"
        fill="#1C1C1C" opacity="0.80">A</text>
  <line x1="28" y1="148" x2="128" y2="148" stroke="#5B9A3A" stroke-width="0.8" opacity="0.4"/>
  <line x1="28" y1="106" x2="128" y2="106" stroke="#5B9A3A" stroke-width="0.8" opacity="0.3"/>
  <line x1="28" y1="58"  x2="128" y2="58"  stroke="#5B9A3A" stroke-width="0.8" opacity="0.25"/>
  <line x1="22" y1="58"  x2="28"  y2="58"  stroke="#5B9A3A" stroke-width="1.2"/>
  <line x1="22" y1="148" x2="28"  y2="148" stroke="#5B9A3A" stroke-width="1.2"/>
  <line x1="25" y1="58"  x2="25"  y2="148" stroke="#5B9A3A" stroke-width="0.7"/>
  <!-- type scale row -->
  <text x="148" y="80" font-family="Georgia,serif" font-size="26" fill="#1C1C1C" opacity="0.7">Aa</text>
  <text x="198" y="80" font-family="Georgia,serif" font-size="20" fill="#1C1C1C" opacity="0.5">Bb</text>
  <text x="238" y="80" font-family="Georgia,serif" font-size="14" fill="#1C1C1C" opacity="0.38">Cc Dd Ee</text>
  <text x="148" y="98" font-family="system-ui,sans-serif" font-size="10" fill="#5B9A3A"
        opacity="0.7" letter-spacing="3">HEADLINE DISPLAY</text>
  <rect x="148" y="106" width="220" height="1.5" rx="1" fill="#1C1C1C" opacity="0.12"/>
  <rect x="148" y="114" width="180" height="1.5" rx="1" fill="#1C1C1C" opacity="0.09"/>
  <rect x="148" y="122" width="200" height="1.5" rx="1" fill="#1C1C1C" opacity="0.07"/>
  <rect x="148" y="130" width="140" height="1.5" rx="1" fill="#1C1C1C" opacity="0.07"/>
  <rect x="148" y="138" width="160" height="1.5" rx="1" fill="#1C1C1C" opacity="0.06"/>

  <!-- ── Left: brand colour stack ── -->
  <rect x="16" y="175" width="22" height="22" rx="3" fill="#1C1C1C"/>
  <rect x="16" y="201" width="22" height="22" rx="3" fill="#3A6B1F"/>
  <rect x="16" y="227" width="22" height="22" rx="3" fill="#5B9A3A"/>
  <rect x="16" y="253" width="22" height="22" rx="3" fill="#8DC468"/>
  <rect x="16" y="279" width="22" height="22" rx="3" fill="#CDE8B4"/>
  <rect x="16" y="305" width="22" height="22" rx="3" fill="#F0EDE5"
