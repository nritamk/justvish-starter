<svg viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="st-grid" patternUnits="userSpaceOnUse" width="30" height="30">
      <path d="M30 0 L0 0 0 30" stroke="#AECC90" stroke-width="0.5" fill="none" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#EBF6DC"/>
  <rect width="400" height="500" fill="url(#st-grid)"/>

  <!-- Ghost number -->
  <text x="340" y="490" font-family="system-ui,sans-serif" font-size="160"
        font-weight="800" fill="#3A6B1F" opacity="0.06" text-anchor="middle">02</text>

  <!-- ── Storyboard frames around the dock ── -->
  <!-- Top-left frame -->
  <rect x="18"  y="18"  width="100" height="72" rx="3" fill="#FFFFFF" stroke="#5B9A3A" stroke-width="1.2" opacity="0.9"/>
  <rect x="22"  y="22"  width="92"  height="52" rx="2" fill="#D8EFC4" opacity="0.8"/>
  <rect x="22"  y="22"  width="92"  height="52" rx="2" fill="none" stroke="#8DC468" stroke-width="0.6"/>
  <!-- film sprocket holes -->
  <rect x="22"  y="23"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="22"  y="34"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="22"  y="45"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="22"  y="56"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="106" y="23"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="106" y="34"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="106" y="45"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="106" y="56"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <!-- frame content: simple scene -->
  <circle cx="78" cy="44" r="14" fill="#8DC468" opacity="0.6"/>
  <text x="56" y="84" font-family="system-ui,sans-serif" font-size="7.5" fill="#3A6B1F" opacity="0.7" letter-spacing="1">SCENE 01</text>

  <!-- Top-center frame -->
  <rect x="150" y="18"  width="100" height="72" rx="3" fill="#FFFFFF" stroke="#5B9A3A" stroke-width="1.2" opacity="0.9"/>
  <rect x="154" y="22"  width="92"  height="52" rx="2" fill="#C4E4A8" opacity="0.7"/>
  <rect x="154" y="22"  width="92"  height="52" rx="2" fill="none" stroke="#8DC468" stroke-width="0.6"/>
  <rect x="154" y="23"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="154" y="34"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="154" y="45"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="154" y="56"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="238" y="23"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="238" y="34"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="238" y="45"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="238" y="56"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="164" y="30"  width="72"  height="36" rx="2" fill="#5B9A3A" opacity="0.25"/>
  <line x1="164" y1="48" x2="236" y2="48" stroke="#3A6B1F" stroke-width="0.8" opacity="0.4"/>
  <text x="188" y="84" font-family="system-ui,sans-serif" font-size="7.5" fill="#3A6B1F" opacity="0.7" letter-spacing="1">SCENE 02</text>

  <!-- Top-right frame -->
  <rect x="282" y="18"  width="100" height="72" rx="3" fill="#FFFFFF" stroke="#5B9A3A" stroke-width="1.2" opacity="0.9"/>
  <rect x="286" y="22"  width="92"  height="52" rx="2" fill="#B8E09A" opacity="0.65"/>
  <rect x="286" y="22"  width="92"  height="52" rx="2" fill="none" stroke="#8DC468" stroke-width="0.6"/>
  <rect x="286" y="23"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="286" y="34"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="286" y="45"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="286" y="56"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="370" y="23"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="370" y="34"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="370" y="45"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <rect x="370" y="56"  width="6"   height="6"  rx="1" fill="#F7F5F0" stroke="#AECC90" stroke-width="0.5"/>
  <polygon points="332,28 368,48 332,68" fill="#3A6B1F" opacity="0.35"/>
  <text x="320" y="84" font-family="system-ui,sans-serif" font-size="7.5" fill="#3A6B1F" opacity="0.7" letter-spacing="1">SCENE 03</text>

  <!-- Arrows: top frames → dock -->
  <path d="M68 90 Q68 134 135 195" stroke="#5B9A3A" stroke-width="1.2" fill="none"
        stroke-dasharray="5 4" opacity="0.5" marker-end="url(#arr)"/>
  <path d="M200 90 L200 178" stroke="#5B9A3A" stroke-width="1.2" fill="none"
        stroke-dasharray="5 4" opacity="0.5"/>
  <path d="M332 90 Q332 134 265 195" stroke="#5B9A3A" stroke-width="1.2" fill="none"
        stroke-dasharray="5 4" opacity="0.5"/>
  <!-- arrowheads (manual triangles) -->
  <polygon points="132,193 140,193 136,200" fill="#5B9A3A" opacity="0.5"/>
  <polygon points="197,175 203,175 200,182" fill="#5B9A3A" opacity="0.5"/>
  <polygon points="262,193 270,193 266,200" fill="#5B9A3A" opacity="0.5"/>

  <!-- ── Camera dock ── -->
  <rect x="132" y="174" width="136" height="92" rx="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="135" y="178" width="130" height="85" rx="3"
        stroke="#5B9A3A" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  <!-- corner brackets -->
  <path d="M135 191 L135 178 L148 178" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <path d="M252 178 L265 178 L265 191" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <path d="M135 250 L135 263 L148 263" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <path d="M252 263 L265 263 L265 250" stroke="#5B9A3A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <!-- crosshair -->
  <line x1="196" y1="220.5" x2="204" y2="220.5" stroke="#5B9A3A" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="216.5" x2="200" y2="224.5" stroke="#5B9A3A" stroke-width="1" opacity="0.5"/>
  <!-- "MAIN SHOT" label -->
  <text x="200" y="274" font-family="monospace,system-ui" font-size="8" fill="#3A6B1F"
        text-anchor="middle" letter-spacing="3" opacity="0.75">MAIN SHOT</text>

  <!-- Arrows: dock → bottom frames -->
  <polygon points="197,265 203,265 200,272" fill="#5B9A3A" opacity="0.5"/>
  <path d="M200 272 L200 358" stroke="#5B9A3A" stroke-width="1.2" fill="none"
        stroke-dasharray="5 4" opacity="0.5"/>
  <path d="M135 263 Q100 310 62 358" stroke="#5B9A3A" stroke-width="1.2" fill="none"
        stroke-dasharray="5 4" opacity="0.5"/>
  <path d="M265 263 Q300 310 338 358" stroke="#5B9A3A" stroke-width="1.2" fill="none"
        stroke-dasharray="5 4" opacity="0.5"/>

  <!-- ── Bottom storyboard frames ── -->
  <!-- Bottom-left frame -->
  <rect x="18"  y="358" width="90" height="66" rx="3" fill="#FFFFFF" stroke="#5B9A3A" stroke-width="1.2" opacity="0.9"/>
  <rect x="22"  y="362" width="82" height="46" rx="2" fill="#D0ECBA" opacity="0.7"/>
  <rect x="22"  y="362" width="82" height="46" rx="2" fill="none" stroke="#8DC468" stroke-width="0.6"/>
  <rect x="30" y="372" width="30" height="20" rx="2" fill="#5B9A3A" opacity="0.3"/>
  <rect x="66" y="372" width="30" height="20" rx="2" fill="#3A6B1F" opacity="0.25"/>
  <text x="56" y="432" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F" opacity="0.7" letter-spacing="1">SCENE 04</text>

  <!-- Bottom-center frame -->
  <rect x="155" y="358" width="90" height="66" rx="3" fill="#FFFFFF" stroke="#5B9A3A" stroke-width="1.2" opacity="0.9"/>
  <rect x="159" y="362" width="82" height="46" rx="2" fill="#BAE0A0" opacity="0.65"/>
  <rect x="159" y="362" width="82" height="46" rx="2" fill="none" stroke="#8DC468" stroke-width="0.6"/>
  <circle cx="200" cy="385" r="16" fill="#5B9A3A" opacity="0.3"/>
  <line x1="184" y1="385" x2="216" y2="385" stroke="#3A6B1F" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="369" x2="200" y2="401" stroke="#3A6B1F" stroke-width="1" opacity="0.5"/>
  <text x="200" y="432" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F" opacity="0.7" text-anchor="middle" letter-spacing="1">SCENE 05</text>

  <!-- Bottom-right frame -->
  <rect x="292" y="358" width="90" height="66" rx="3" fill="#FFFFFF" stroke="#5B9A3A" stroke-width="1.2" opacity="0.9"/>
  <rect x="296" y="362" width="82" height="46" rx="2" fill="#A4D890" opacity="0.6"/>
  <rect x="296" y="362" width="82" height="46" rx="2" fill="none" stroke="#8DC468" stroke-width="0.6"/>
  <rect x="304" y="370" width="66" height="30" rx="2" fill="#3A6B1F" opacity="0.2"/>
  <polygon points="337,376 337,394 353,385" fill="#5B9A3A" opacity="0.5"/>
  <text x="337" y="432" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F" opacity="0.7" text-anchor="middle" letter-spacing="1">SCENE 06</text>

  <!-- ── Media channel icons (sides) ── -->
  <!-- left: film reel icon -->
  <circle cx="30" cy="280" r="20" fill="none" stroke="#5B9A3A" stroke-width="1.5" opacity="0.5"/>
  <circle cx="30" cy="280" r="6"  fill="none" stroke="#5B9A3A" stroke-width="1" opacity="0.5"/>
  <circle cx="30" cy="260" r="3"  fill="#5B9A3A" opacity="0.4"/>
  <circle cx="30" cy="300" r="3"  fill="#5B9A3A" opacity="0.4"/>
  <circle cx="10" cy="280" r="3"  fill="#5B9A3A" opacity="0.4"/>
  <circle cx="50" cy="280" r="3"  fill="#5B9A3A" opacity="0.4"/>
  <text x="30" y="315" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F"
        opacity="0.55" text-anchor="middle" letter-spacing="1">FILM</text>

  <!-- right: signal/broadcast icon -->
  <path d="M358 270 Q370 260 382 270" stroke="#5B9A3A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M352 278 Q370 264 388 278" stroke="#5B9A3A" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M346 286 Q370 268 394 286" stroke="#5B9A3A" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.3"/>
  <circle cx="370" cy="286" r="4" fill="#5B9A3A" opacity="0.55"/>
  <line x1="370" y1="290" x2="370" y2="305" stroke="#5B9A3A" stroke-width="1.2" opacity="0.5"/>
  <rect x="360" y="305" width="20" height="4" rx="1" fill="#5B9A3A" opacity="0.35"/>
  <text x="370" y="320" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F"
        opacity="0.55" text-anchor="middle" letter-spacing="1">DIGITAL</text>

  <!-- ── Timeline bar at bottom ── -->
  <rect x="16" y="450" width="368" height="8" rx="4" fill="#C4E4A8" opacity="0.6"/>
  <rect x="16" y="450" width="92"  height="8" rx="4" fill="#5B9A3A" opacity="0.7"/>
  <!-- phase markers -->
  <rect x="108" y="447" width="1.5" height="14" rx="1" fill="#3A6B1F" opacity="0.5"/>
  <rect x="200" y="447" width="1.5" height="14" rx="1" fill="#3A6B1F" opacity="0.5"/>
  <rect x="292" y="447" width="1.5" height="14" rx="1" fill="#3A6B1F" opacity="0.5"/>
  <text x="62"  y="472" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F" opacity="0.55" text-anchor="middle">IDEATE</text>
  <text x="154" y="472" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F" opacity="0.45" text-anchor="middle">PLAN</text>
  <text x="246" y="472" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F" opacity="0.45" text-anchor="middle">PRODUCE</text>
  <text x="338" y="472" font-family="system-ui,sans-serif" font-size="7" fill="#3A6B1F" opacity="0.45" text-anchor="middle">DELIVER</text>

  <!-- thin divider row labels below top frames -->
  <text x="18"  y="107" font-family="system-ui,sans-serif" font-size="7.5" fill="#3A6B1F" opacity="0.6" letter-spacing="2">STORYBOARD</text>
  <line x1="16" y1="112" x2="384" y2="112" stroke="#5B9A3A" stroke-width="0.6" opacity="0.3"/>
</svg>
