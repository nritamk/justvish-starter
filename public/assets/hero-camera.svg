<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a6b1f"/>
      <stop offset="55%" stop-color="#5b9a3a"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <radialGradient id="light" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0b48a"/>
      <stop offset="100%" stop-color="#a87850"/>
    </linearGradient>
    <linearGradient id="jacket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#8dc468"/>
      <stop offset="40%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#light)"/>

  <!-- Soft bokeh -->
  <g opacity="0.35">
    <circle cx="120" cy="160" r="60" fill="#b5d98a"/>
    <circle cx="700" cy="110" r="40" fill="#8dc468"/>
    <circle cx="640" cy="260" r="22" fill="#c8e6a0"/>
    <circle cx="80" cy="400" r="36" fill="#8dc468"/>
    <circle cx="730" cy="850" r="80" fill="#3a6b1f"/>
  </g>

  <!-- Person silhouette -->
  <!-- Shoulders / jacket -->
  <path d="M120 1000 C 160 700, 240 620, 400 600 C 560 620, 640 700, 680 1000 Z"
        fill="url(#jacket)"/>
  <!-- Neck -->
  <rect x="370" y="500" width="60" height="120" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="400" cy="430" rx="110" ry="130" fill="url(#skin)"/>
  <!-- Hair -->
  <path d="M290 410 C 290 290, 510 290, 510 410 C 510 360, 470 320, 400 320 C 330 320, 290 360, 290 410 Z"
        fill="#1c1c1c"/>

  <!-- Camera held up to face -->
  <g transform="translate(260,430)">
    <rect x="0" y="0" width="280" height="170" rx="14" fill="#0d0d0d" stroke="#5b9a3a" stroke-width="2"/>
    <rect x="90" y="-22" width="80" height="26" rx="4" fill="#0d0d0d"/>
    <!-- Lens -->
    <circle cx="140" cy="85" r="68" fill="#1a1a1a" stroke="#8dc468" stroke-width="2"/>
    <circle cx="140" cy="85" r="55" fill="#0a0a0a"/>
    <circle cx="140" cy="85" r="42" fill="url(#lens)"/>
    <circle cx="140" cy="85" r="14" fill="#000"/>
    <circle cx="125" cy="70" r="6" fill="#b5d98a" opacity="0.85"/>
    <!-- Side grip -->
    <rect x="280" y="20" width="34" height="120" rx="6" fill="#0d0d0d"/>
    <!-- REC light -->
    <circle cx="240" cy="20" r="6" fill="#e74c3c"/>
    <!-- Brand mark -->
    <text x="20" y="148" font-family="Poppins, sans-serif" font-size="11"
          font-weight="700" fill="#8dc468" letter-spacing="2">JUSTVISH · 4K</text>
  </g>

  <!-- Hands -->
  <ellipse cx="225" cy="540" rx="55" ry="42" fill="url(#skin)"/>
  <ellipse cx="585" cy="540" rx="55" ry="42" fill="url(#skin)"/>

  <!-- Vignette -->
  <radialGradient id="vig" cx="0.5" cy="0.5" r="0.75">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="800" height="1000" fill="url(#vig)"/>
</svg>
